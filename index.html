<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外企求职报告</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --paper: #ffffff;
      --ink: #15202b;
      --muted: #657386;
      --line: #d9e3ee;
      --soft: #eaf6ff;
      --accent: #1267b3;
      --accent-dark: #0a4f91;
      --good: #0b7a56;
      --warn: #a35a00;
      --shadow: 0 14px 34px rgba(21, 32, 43, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }

    header {
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      padding: 24px 20px;
      text-align: center;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 760;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto 56px;
    }

    .job-board > h2 {
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .job-list {
      display: grid;
      gap: 18px;
    }

    .job-card {
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 2.5vw, 28px);
    }

    .card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .rank {
      display: inline-grid;
      min-width: 42px;
      height: 28px;
      place-items: center;
      margin-bottom: 10px;
      border-radius: 999px;
      background: #e2f0fc;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 850;
    }

    .job-title {
      font-size: clamp(20px, 2.5vw, 28px);
      line-height: 1.24;
      font-weight: 840;
      overflow-wrap: anywhere;
    }

    .company {
      margin-top: 6px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 680;
    }

    .score {
      min-width: 88px;
      padding: 10px 12px;
      border: 1px solid #b9daf9;
      border-radius: 8px;
      background: #f4faff;
      color: var(--accent-dark);
      text-align: center;
    }

    .score strong {
      display: block;
      font-size: 29px;
      line-height: 1;
      font-weight: 880;
    }

    .score span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .fact {
      min-height: 76px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .fact strong {
      display: block;
      margin-top: 4px;
      font-size: 15px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .apply {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-bottom: 18px;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 820;
      text-decoration: none;
    }

    .apply:hover,
    .apply:focus-visible {
      background: var(--accent-dark);
    }

    .notes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .note {
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: #f8fbff;
    }

    .note:nth-child(2) {
      border-left-color: var(--warn);
    }

    .note:nth-child(3) {
      border-left-color: var(--good);
    }

    .note h3 {
      margin-bottom: 6px;
      font-size: 15px;
      font-weight: 830;
    }

    .note p {
      color: #354254;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 22px, 1180px);
        margin-top: 22px;
      }

      .card-top,
      .facts,
      .notes {
        grid-template-columns: 1fr;
      }

      .score {
        width: 100%;
      }
    }
  </style>
</head>

        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

</body>
</html>
